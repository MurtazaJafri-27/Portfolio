<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="postingsLogin.css"> 
    <title>Login to Postings!</title>
</head>
<body>
    <h1 class="postingsTitle">POSTINGS.</h1>
    <main>
        <div class="loginMessage"><h1>LOGIN TO YOUR POSTINGS ACCOUNT!</h1><p>(This page is for the creator only.)</p></div>
        <h1 class="emailTitle">Email</h1>
        <div class="emailDiv"><input type="text" id="emailInput" placeholder="Your email..."></div>
        <h1 class="passwordTitle">Password</h1>
        <div class="passDiv"><input type="text" id="passInput" placeholder="Your password..."></div>
        <h1 class="messageTitle">Message</h1>
        <div class="messageDiv"><textarea id="messageInput"></textarea></div>
    </main>
    <button type="submit" id="loginButton"><h1>Login</h1></button>
    <script type="module" src="postingsLogin.js"></script>
</body>
</html>
